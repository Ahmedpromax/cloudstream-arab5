name: Build Extensions

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17
      - name: Build
        run: chmod +x gradlew && ./gradlew make
      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: builds
          folder: ./builds
          clean: false
