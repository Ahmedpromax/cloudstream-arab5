name: Build Extensions

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2

      - name: Build
        run: gradle make

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: builds
          folder: ./builds
          clean: false
